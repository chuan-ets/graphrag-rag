  #     - ./app/data:/app/data
  #   env_file:
  #     - .env
  #   depends_on:
  #     - minio
  #     - chromadb
  #   networks:
  #     - rag-net
  #   environment:
  #     - PYTHONUNBUFFERED=1

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    networks:
      - rag-net

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
    networks:
      - rag-net

volumes:
  minio-data:
  chroma-data:

networks:
  rag-net:
    driver: bridge